# Railway Nixpacks configuration for Laravel 12
# https://nixpacks.com/docs/providers/php

[phases.setup]
nixPkgs = ["php83", "php83Extensions.mbstring", "php83Extensions.tokenizer", "php83Extensions.xml", "php83Extensions.ctype", "php83Extensions.fileinfo", "php83Extensions.openssl", "php83Extensions.pdo", "php83Extensions.pdo_mysql", "nodejs_20"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader", "npm ci"]

[phases.build]
cmds = [
    "npm run build",
    "rm -f public/hot",
    "mkdir -p storage/framework/{cache/data,sessions,views,testing}",
    "mkdir -p storage/logs",
    "mkdir -p bootstrap/cache",
]

[start]
cmd = "rm -f public/hot && php artisan migrate --force; php artisan optimize && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
