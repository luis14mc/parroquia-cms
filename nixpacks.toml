# Railway Nixpacks configuration for Laravel 12
# https://nixpacks.com/docs/providers/php

[phases.setup]
nixPkgs = ["..."]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[phases.build]
cmds = [
    "php -r \"file_exists('.env') || copy('.env.example', '.env');\"",
    "php artisan key:generate",
    "rm -f public/hot",
    "mkdir -p storage/framework/{cache/data,sessions,views,testing}",
    "mkdir -p storage/logs",
    "mkdir -p bootstrap/cache",
]

[start]
# optimize:clear vacía TODAS las cachés de Laravel (config, rutas, vistas, datos cache, compilados).
cmd = "rm -f public/hot && php artisan optimize:clear && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
