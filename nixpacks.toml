# Railway Nixpacks configuration for Laravel 12
# https://nixpacks.com/docs/providers/php

[phases.setup]
nixPkgs = ["php83", "php83Extensions.mbstring", "php83Extensions.tokenizer", "php83Extensions.xml", "php83Extensions.ctype", "php83Extensions.fileinfo", "php83Extensions.openssl", "php83Extensions.pdo", "php83Extensions.pdo_mysql", "nodejs_20"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader", "npm ci"]

[phases.build]
cmds = [
    "npm run build",
    "rm -f public/hot",
    "mkdir -p storage/framework/{cache/data,sessions,views,testing}",
    "mkdir -p storage/logs",
    "mkdir -p bootstrap/cache",
]

[start]
# NO usar "php artisan optimize" aquí: hace config:cache y en runtime env() deja de funcionar
# fuera de config/*.php; además puede fijar credenciales vacías si algo falla al arrancar.
# config:clear + migrate con las variables ya inyectadas por Railway; sin caché de config en disco.
cmd = "rm -f public/hot && php artisan config:clear && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
