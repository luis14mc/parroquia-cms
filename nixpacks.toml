# Railway Nixpacks configuration for Laravel 12
# https://nixpacks.com/docs/providers/php
#
# IMPORTANTE: usar "..." para EXTENDER el plan del proveedor PHP. Si se lista solo php83
# y paquetes sueltos sin "...", se REEMPLAZA el PHP que Nixpacks arma desde composer.json
# (ext-pdo_mysql) y en runtime puede fallar con "could not find driver".

[phases.setup]
nixPkgs = ["...", "nodejs_20"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader", "npm ci"]

[phases.build]
cmds = [
    "php -r \"extension_loaded('pdo_mysql') || (fwrite(STDERR, 'FALTA ext-pdo_mysql en la imagen. Revisa nixpacks.toml (nixPkgs debe incluir ...).\\n') && exit(1));\"",
    "npm run build",
    "rm -f public/hot",
    "mkdir -p storage/framework/{cache/data,sessions,views,testing}",
    "mkdir -p storage/logs",
    "mkdir -p bootstrap/cache",
]

[start]
# optimize:clear vacía TODAS las cachés de Laravel (config, rutas, vistas, datos cache, compilados).
# NO confundir con "php artisan optimize" (sin :clear), que hace config:cache y rompe env en runtime.
# Luego migrate --force contra la BD con variables ya inyectadas por Railway.
cmd = "rm -f public/hot && php artisan optimize:clear && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
